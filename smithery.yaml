name: agriculture-robotics-mcp
description: 'Agriculture Robotics tools for AI agents. Capabilities: robot safety
  check, spray plan calculator, harvest optimization. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: robot_safety_check
  description: Run safety diagnostics on agricultural robot systems per ISO 18497-1:2022
    collaborative robots.
  parameters:
  - name: robot_type
    type: string
    required: true
  - name: max_speed_ms
    type: number
    required: true
  - name: has_emergency_stop
    type: boolean
    required: true
- name: spray_plan_calculator
  description: Calculate spray coverage with EPA drift mitigation and buffer zone
    compliance.
  parameters:
  - name: field_ha
    type: number
    required: true
  - name: chemical_l_per_ha
    type: number
    required: true
  - name: buffer_m
    type: number
    required: true
  - name: wind_speed_ms
    type: number
    required: false
- name: harvest_optimization
  description: Optimize harvest schedule based on crop moisture, weather, and equipment
    readiness.
  parameters:
  - name: crop_type
    type: string
    required: true
  - name: moisture_percent
    type: number
    required: true
  - name: weather_forecast
    type: string
    required: true
  - name: equipment_available
    type: boolean
    required: false
- name: drone_flight_plan
  description: Generate FAA Part 107 compliant agricultural drone flight plan.
  parameters:
  - name: field_bounds
    type: array
    required: true
  - name: max_altitude_m
    type: number
    required: true
  - name: has_geo_fence
    type: boolean
    required: true
  - name: operation_type
    type: string
    required: false
- name: soil_analysis
  description: Analyze soil nutrients and generate fertilizer recommendations.
  parameters:
  - name: field_id
    type: string
    required: true
  - name: ph
    type: number
    required: true
  - name: nitrogen_ppm
    type: number
    required: true
  - name: phosphorus_ppm
    type: number
    required: true
  - name: potassium_ppm
    type: number
    required: true
- name: irrigation_schedule
  description: Calculate irrigation schedule using FAO-56 evapotranspiration.
  parameters:
  - name: crop
    type: string
    required: true
  - name: eto_mm
    type: number
    required: true
  - name: soil_capacity_mm
    type: number
    required: true
  - name: days_since_water
    type: number
    required: true
