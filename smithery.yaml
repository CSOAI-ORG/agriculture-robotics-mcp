name: agriculture-robotics-mcp
description: MEOK AI Labs MCP Server
version: 1.0.0
tools:
- name: robot_safety_check
  description: Run safety diagnostics on agricultural robot systems before field deployment.
  parameters:
  - name: robot_type
    type: string
    required: true
  - name: max_speed_ms
    type: number
    required: true
  - name: has_emergency_stop
    type: boolean
    required: true
- name: spray_plan_calculator
  description: Calculate optimal spray coverage plan based on field size, wind, and
    crop type.
  parameters:
  - name: field_ha
    type: number
    required: true
  - name: chemical_l_per_ha
    type: number
    required: true
  - name: buffer_m
    type: number
    required: true
- name: harvest_optimization
  description: Optimize harvest schedule based on crop maturity, weather, and equipment
    availability.
  parameters:
  - name: crop_type
    type: string
    required: true
  - name: moisture_percent
    type: number
    required: true
  - name: weather_forecast
    type: string
    required: true
- name: drone_flight_plan
  description: Generate an agricultural drone flight plan with waypoints and spray
    coverage mapping.
  parameters:
  - name: field_bounds
    type: array
    required: true
  - name: max_altitude_m
    type: number
    required: true
  - name: has_geo_fence
    type: boolean
    required: true
